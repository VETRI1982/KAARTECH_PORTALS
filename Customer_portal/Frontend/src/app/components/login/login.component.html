<div class="page-wrapper">
  <div class="login-container">
    
    <!-- Left Side: Hero Section -->
    <div class="hero-section">
      <div class="circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
      </div>
      <div class="hero-content">
        <div class="brand-header">
          <img src="/logo.png" alt="Logo" class="logo-img" />
          <span class="brand-name">Customer Portal</span>
        </div>
        <h1 class="hero-title">Hello,<br>welcome!</h1>
        <p class="hero-subtitle">
          Enter your personal details and start your journey with our professional customer portal.
        </p>
      </div>
    </div>

    <!-- Right Side: Form Section -->
    <div class="form-section">
      <div class="form-wrapper">
        <form class="login-form" (ngSubmit)="login()">
          <div class="field-group">
            <span class="input-icon">👤</span>
            <input
              id="username"
              type="text"
              name="username"
              placeholder="User Name"
              [(ngModel)]="username"
              required
            />
          </div>

          <div class="field-group">
            <span class="input-icon">🔒</span>
            <input
              id="password"
              type="password"
              name="password"
              placeholder="Password"
              [(ngModel)]="password"
              required
            />
          </div>

          <div class="form-footer-links">
            <label class="remember-me">
              <input type="checkbox"> Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <div class="action-buttons">
  <button type="submit" class="btn-login">LOGIN</button>
</div>

          <p class="error-msg" *ngIf="message">{{ message }}</p>

          <div class="social-login">
            <span>Follow us</span>
            <div class="social-icons">
              <!-- Facebook -->
              <a href="#" class="social-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
              </a>
              <!-- Twitter/X -->
              <a href="#" class="social-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>
              </a>
              <!-- LinkedIn -->
              <a href="#" class="social-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2zM4 2a2 2 0 1 1-2 2 2 2 0 0 1 2-2z"></path></svg>
              </a>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
